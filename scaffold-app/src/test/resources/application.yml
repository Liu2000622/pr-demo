server:
  port: 0

spring:
  application:
    name: scaffold-app
  datasource:
    # In-memory H2 so the test suite runs without an external MySQL instance.
    url: jdbc:h2:mem:scaffold_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
