server:
  port: 8080

spring:
  application:
    name: scaffold-app
  datasource:
    # Using H2 in-memory database for immediate runnability
    url: jdbc:h2:mem:scaffold_db
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    # To use MySQL, uncomment the following and comment out H2:
    # url: jdbc:mysql://localhost:3306/scaffold_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # username: root
    # password: yourpassword
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
