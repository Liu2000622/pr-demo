<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - Spring Boot Scaffold</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
            padding: 40px;
            width: 420px;
            text-align: center;
        }
        .card h1 { font-size: 24px; margin-bottom: 16px; color: #333; }
        .card p { color: #666; margin-bottom: 24px; line-height: 1.6; }
        .card .user { font-weight: 600; color: #667eea; }
        button {
            padding: 10px 24px; background: #e74c3c; color: #fff;
            border: none; border-radius: 6px; font-size: 14px; cursor: pointer;
        }
        button:hover { background: #c0392b; }
        .links { margin-top: 18px; font-size: 14px; color: #888; }
        .links a { color: #667eea; text-decoration: none; margin: 0 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>欢迎</h1>
        <p id="welcome">正在检查登录状态...</p>
        <div id="actions" style="display:none;">
            <button id="logoutBtn">退出登录</button>
        </div>
        <div class="links">
            <a href="/login.html">登录</a>
            <a href="/register.html">注册</a>
        </div>
    </div>

    <script>
        async function checkAuth() {
            try {
                const resp = await fetch("/api/me");
                const data = await resp.json();
                if (resp.ok && data.authenticated) {
                    document.getElementById("welcome").innerHTML =
                        "你好，<span class='user'>" + (data.username || "") + "</span>！你已登录。";
                    document.getElementById("actions").style.display = "block";
                } else {
                    document.getElementById("welcome").innerHTML = "你尚未登录，请先<a href='/login.html' style='color:#667eea'>登录</a>。";
                }
            } catch (e) {
                document.getElementById("welcome").textContent = "无法连接服务器。";
            }
        }

        document.getElementById("logoutBtn").addEventListener("click", async function () {
            await fetch("/api/logout", { method: "POST" });
            window.location.href = "/login.html";
        });

        checkAuth();
    </script>
</body>
</html>
